<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena - Learning Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .chat-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .messages {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            max-width: 80%;
        }

        .user-message {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .assistant-message {
            background: white;
            border: 1px solid #e0e0e0;
        }

        .sources {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
            font-size: 0.85em;
            color: #666;
        }

        .source-item {
            margin: 5px 0;
            padding: 5px;
            background: #f9f9f9;
            border-radius: 5px;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .stats {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 ATHENA</h1>
            <p>Your AI Learning Assistant</p>
        </div>

        <div class="stats" id="stats">
            Loading...
        </div>

        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message assistant-message">
                    <strong>Athena:</strong><br>
                    Hello! I'm Athena, your AI learning assistant. I have knowledge about neural networks, backpropagation, and machine learning concepts. Ask me anything!
                </div>
            </div>

            <div class="input-area">
                <div class="input-group">
                    <input
                        type="text"
                        id="questionInput"
                        placeholder="Ask a question about your study materials..."
                        onkeypress="handleKeyPress(event)"
                    >
                    <button onclick="askQuestion()" id="sendBtn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        // Load stats on page load
        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/`);
                const data = await response.json();
                document.getElementById('stats').innerHTML = `
                    📚 ${data.documents_loaded} documents loaded | ✅ Status: ${data.status}
                `;
            } catch (error) {
                document.getElementById('stats').innerHTML = '⚠️ Could not connect to API';
            }
        }

        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                askQuestion();
            }
        }

        // Add message to chat
        function addMessage(text, isUser, sources = null) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'assistant-message'}`;

            let content = `<strong>${isUser ? 'You' : 'Athena'}:</strong><br>${text}`;

            // Add sources if available
            if (sources && sources.length > 0) {
                content += '<div class="sources"><strong>Sources:</strong>';
                sources.forEach((source, idx) => {
                    content += `<div class="source-item">
                        [${(source.score * 100).toFixed(1)}%] ${source.text.substring(0, 100)}...
                    </div>`;
                });
                content += '</div>';
            }

            messageDiv.innerHTML = content;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Ask question
        async function askQuestion() {
            const input = document.getElementById('questionInput');
            const sendBtn = document.getElementById('sendBtn');
            const question = input.value.trim();

            if (!question) return;

            // Add user message
            addMessage(question, true);
            input.value = '';

            // Disable input while processing
            input.disabled = true;
            sendBtn.disabled = true;

            // Show loading
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.id = 'loading';
            loadingDiv.innerHTML = '🤔 Thinking...';
            document.getElementById('messages').appendChild(loadingDiv);

            try {
                // Call API
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: question,
                        top_k: 3
                    })
                });

                if (!response.ok) {
                    throw new Error('API request failed');
                }

                const data = await response.json();

                // Remove loading
                document.getElementById('loading').remove();

                // Add assistant response
                addMessage(data.answer, false, data.sources);

            } catch (error) {
                document.getElementById('loading').remove();
                addMessage(`Error: ${error.message}. Make sure the API is running!`, false);
            }

            // Re-enable input
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
        }

        // Load stats on page load
        loadStats();
    </script>
</body>
</html>
